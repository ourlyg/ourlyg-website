<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="房贷计算器 - 快速计算月供、总利息和还款计划，等额本息/等额本金对比">
    <title>房贷计算器 - 我们的理易港</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .result-card-blue { background: var(--color-primary); color: white; border-radius: 12px; padding: var(--spacing-6); text-align:center; }
        .result-card-green { background: var(--color-success); color: white; border-radius: 12px; padding: var(--spacing-6); text-align:center; }
        .result-card-gray { background: var(--color-bg-gray); border-radius: 12px; padding: var(--spacing-6); text-align:center; border: 1px solid var(--color-border-light); }
        .result-big { font-size: 32px; font-weight: 700; }
        .compare-tab { padding: var(--spacing-2) var(--spacing-5); border: 1px solid var(--color-primary); border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .compare-tab.active { background: var(--color-primary); color: white; }
        .compare-tab:hover:not(.active) { background: var(--color-primary-light); }
        .payment-row:nth-child(even) td { background: var(--color-bg-gray); }
        .payment-row td { padding: 8px 16px; border-bottom: 1px solid var(--color-border-light); font-size: 13px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><span class="logo-icon">💰</span>我们的理易港</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="../products/index.html">产品测评</a></li>
                    <li class="nav-item"><a class="nav-link active" href="index.html">理财工具</a></li>
                    <li class="nav-item"><a class="nav-link" href="../knowledge/index.html">知识科普</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <h1 class="hero-title">房贷计算器</h1>
                    <p class="hero-subtitle">支持等额本息和等额本金对比，计算月供、总利息和完整还款计划。</p>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="row g-5">
                <div class="col-md-5">
                    <div class="card" style="position: sticky; top: 80px;">
                        <div class="card-body" style="padding: var(--spacing-6);">
                            <h3 style="font-weight:600; margin-bottom: var(--spacing-6);">🏠 贷款信息</h3>
                            <div class="mb-4">
                                <label class="form-label">贷款总额（万元）</label>
                                <input type="number" class="form-control" id="loanAmount" value="100" min="0" step="10">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">贷款年限（年）</label>
                                <div style="display:flex; gap: var(--spacing-2); flex-wrap:wrap;">
                                    <button class="btn btn-outline btn-sm year-btn active" onclick="setYears(10, this)">10年</button>
                                    <button class="btn btn-outline btn-sm year-btn" onclick="setYears(15, this)">15年</button>
                                    <button class="btn btn-outline btn-sm year-btn" onclick="setYears(20, this)">20年</button>
                                    <button class="btn btn-outline btn-sm year-btn" onclick="setYears(25, this)">25年</button>
                                    <button class="btn btn-outline btn-sm year-btn" onclick="setYears(30, this)">30年</button>
                                </div>
                                <input type="number" class="form-control mt-2" id="loanYears" value="20" min="1" max="30">
                            </div>
                            <div class="mb-5">
                                <label class="form-label">年利率（%）<span style="color:var(--color-text-hint); font-size:13px;"> 当前LPR 3.1%</span></label>
                                <input type="number" class="form-control" id="loanRate" value="3.1" min="0" max="20" step="0.05">
                            </div>
                            <button class="btn btn-primary w-100 btn-lg" onclick="calculate()">计算月供</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-7" id="resultPanel" style="display:none;">
                    <!-- 切换标签 -->
                    <div style="display:flex; gap: var(--spacing-2); margin-bottom: var(--spacing-6);">
                        <button class="compare-tab active" id="tabEP" onclick="switchTab('ep')">等额本息</button>
                        <button class="compare-tab" id="tabPC" onclick="switchTab('pc')">等额本金</button>
                    </div>

                    <!-- 等额本息结果 -->
                    <div id="epResult">
                        <div class="row g-3 mb-5">
                            <div class="col-6 col-md-4">
                                <div class="result-card-blue"><p style="font-size:13px; opacity:0.85; margin-bottom:4px;">每月月供</p><div class="result-big" id="epMonthly"></div></div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="result-card-gray"><p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:4px;">还款总额</p><div class="result-big" style="color:var(--color-text-primary);" id="epTotal"></div></div>
                            </div>
                            <div class="col-12 col-md-4">
                                <div class="result-card-gray" style="background:#FFF3E0;"><p style="font-size:13px; color:#E65100; margin-bottom:4px;">支付总利息</p><div class="result-big" style="color:#E65100;" id="epInterest"></div></div>
                            </div>
                        </div>
                        <div style="background:var(--color-primary-light); border-radius:8px; padding: var(--spacing-4); margin-bottom: var(--spacing-6); border-left:4px solid var(--color-primary);">
                            <strong>等额本息：</strong>每个月还相同金额，前期利息多、本金少，后期本金多、利息少。月供固定，便于规划，适合大多数人。
                        </div>
                        <div class="card" style="overflow:hidden;" id="epTableWrap"></div>
                    </div>

                    <!-- 等额本金结果（隐藏） -->
                    <div id="pcResult" style="display:none;">
                        <div class="row g-3 mb-5">
                            <div class="col-6 col-md-4">
                                <div class="result-card-green"><p style="font-size:13px; opacity:0.85; margin-bottom:4px;">首月月供</p><div class="result-big" id="pcFirst"></div></div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="result-card-gray"><p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:4px;">还款总额</p><div class="result-big" style="color:var(--color-text-primary);" id="pcTotal"></div></div>
                            </div>
                            <div class="col-12 col-md-4">
                                <div class="result-card-gray" style="background:#FFF3E0;"><p style="font-size:13px; color:#E65100; margin-bottom:4px;">支付总利息</p><div class="result-big" style="color:#E65100;" id="pcInterest"></div></div>
                            </div>
                        </div>
                        <div style="background:#E8F5E9; border-radius:8px; padding: var(--spacing-4); margin-bottom: var(--spacing-6); border-left:4px solid var(--color-success);">
                            <strong>等额本金：</strong>每个月还相同本金，利息随本金减少而减少，总利息比等额本息少，但前期月供高。适合收入较高、希望少付利息的人群。
                        </div>
                        <div class="card" style="overflow:hidden;" id="pcTableWrap"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer><div class="container"><p>&copy; 2025 我们的理易港. All rights reserved.</p><p style="margin-top:var(--spacing-2);">让理财变得简单</p></div></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setYears(y, btn) {
            document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('loanYears').value = y;
            calculate();
        }
        function fmt(n) { return (n/10000).toFixed(2) + '万'; }
        function fmtY(n) { return '¥' + n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
        function switchTab(t) {
            document.getElementById('epResult').style.display = t === 'ep' ? '' : 'none';
            document.getElementById('pcResult').style.display = t === 'pc' ? '' : 'none';
            document.getElementById('tabEP').classList.toggle('active', t === 'ep');
            document.getElementById('tabPC').classList.toggle('active', t === 'pc');
        }
        function buildTable(containerId, rows, isEP) {
            const head = isEP
                ? '<tr style="background:var(--color-primary);color:white;"><th style="padding:10px 16px;">期次</th><th style="padding:10px 16px;">月供</th><th style="padding:10px 16px;">本金</th><th style="padding:10px 16px;">利息</th><th style="padding:10px 16px;">剩余本金</th></tr>'
                : '<tr style="background:var(--color-success);color:white;"><th style="padding:10px 16px;">期次</th><th style="padding:10px 16px;">月供</th><th style="padding:10px 16px;">本金</th><th style="padding:10px 16px;">利息</th><th style="padding:10px 16px;">剩余本金</th></tr>';
            // 只显示前24期和后12期，中间省略
            const shown = rows.length <= 36 ? rows : [...rows.slice(0,24), null, ...rows.slice(-12)];
            const tbody = shown.map(r => r === null
                ? '<tr><td colspan="5" style="text-align:center;padding:10px;color:var(--color-text-hint);">…… 中间期次省略 ……</td></tr>'
                : `<tr class="payment-row"><td>${r.month}</td><td>${fmtY(r.payment)}</td><td>${fmtY(r.principal)}</td><td style="color:#E65100">${fmtY(r.interest)}</td><td>${fmt(r.remain)}</td></tr>`
            ).join('');
            document.getElementById(containerId).innerHTML = `<table class="w-100"><thead>${head}</thead><tbody>${tbody}</tbody></table>`;
        }
        function calculate() {
            const loan = (parseFloat(document.getElementById('loanAmount').value)||0) * 10000;
            const years = parseInt(document.getElementById('loanYears').value)||20;
            const rate = parseFloat(document.getElementById('loanRate').value)/100/12;
            const n = years * 12;
            if (!loan || !rate) return;

            // 等额本息
            const epPayment = loan * rate * Math.pow(1+rate, n) / (Math.pow(1+rate, n) - 1);
            let bal = loan, epRows = [], epTotalInt = 0;
            for (let i = 1; i <= n; i++) {
                const int = bal * rate;
                const pri = epPayment - int;
                bal -= pri; epTotalInt += int;
                epRows.push({ month: i, payment: epPayment, principal: pri, interest: int, remain: Math.max(0, bal) });
            }
            document.getElementById('epMonthly').textContent = fmtY(epPayment);
            document.getElementById('epTotal').textContent = fmt(epPayment * n);
            document.getElementById('epInterest').textContent = fmt(epTotalInt);
            buildTable('epTableWrap', epRows, true);

            // 等额本金
            const pcPrincipal = loan / n;
            bal = loan; let pcRows = [], pcTotalInt = 0, pcFirst;
            for (let i = 1; i <= n; i++) {
                const int = bal * rate;
                const payment = pcPrincipal + int;
                if (i === 1) pcFirst = payment;
                bal -= pcPrincipal; pcTotalInt += int;
                pcRows.push({ month: i, payment, principal: pcPrincipal, interest: int, remain: Math.max(0, bal) });
            }
            document.getElementById('pcFirst').textContent = fmtY(pcFirst);
            document.getElementById('pcTotal').textContent = fmt(pcPrincipal * n + pcTotalInt);
            document.getElementById('pcInterest').textContent = fmt(pcTotalInt);
            buildTable('pcTableWrap', pcRows, false);

            document.getElementById('resultPanel').style.display = '';
        }
        document.addEventListener('DOMContentLoaded', calculate);
        ['loanAmount','loanYears','loanRate'].forEach(id => document.getElementById(id).addEventListener('input', calculate));
    </script>
</body>
</html>
