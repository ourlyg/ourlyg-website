<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收益计算器 - 我们的理易港</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .section-padding {
            padding: 80px 0;
        }
        .result-card {
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="../index.html" target="_self">
                <span class="logo-icon">💰</span>
                我们的理易港
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html" target="_self">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../products/index.html" target="_blank">产品测评</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html" target="_self">理财工具</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../knowledge/index.html" target="_blank">知识科普</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="hero-section" style="min-height: auto;">
        <div class="container">
            <div class="row">
                <div class="col-md-8 col-lg-6">
                    <h1 class="hero-title">收益计算器</h1>
                    <p class="hero-subtitle">快速计算投资收益，支持单利和复利计算</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 计算器 -->
    <section class="section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card">
                        <div class="card-body">
                            <h3 class="card-title mb-4">收益计算器</h3>

                            <!-- 输入区域 -->
                            <form id="interestForm">
                                <div class="mb-3">
                                    <label for="principal" class="form-label">本金（元）</label>
                                    <input type="number" class="form-control" id="principal" value="10000" min="0" step="100">
                                </div>

                                <div class="mb-3">
                                    <label for="rate" class="form-label">年化收益率（%）</label>
                                    <input type="number" class="form-control" id="rate" value="4.5" min="0" max="100" step="0.1">
                                </div>

                                <div class="mb-3">
                                    <label for="years" class="form-label">投资期限（年）</label>
                                    <input type="number" class="form-control" id="years" value="1" min="1" max="50" step="1">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">计算方式</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="calcType" id="simpleInterest" value="simple" checked>
                                        <label class="form-check-label" for="simpleInterest">
                                            单利（到期一次性计息）
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="calcType" id="compoundInterest" value="compound">
                                        <label class="form-check-label" for="compoundInterest">
                                            复利（利息再投资）
                                        </label>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-primary btn-lg w-100" onclick="calculateInterest()">
                                    计算收益
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 结果展示 -->
    <section class="section" id="resultSection" style="display: none;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card">
                        <div class="card-body">
                            <h3 class="card-title mb-4">计算结果</h3>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <div class="result-card text-center p-4" style="background: var(--color-primary-light); color: var(--color-primary); border-radius: 8px;">
                                        <h4 class="mb-2">到期利息</h4>
                                        <h2 id="interestResult">¥0.00</h2>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-4">
                                    <div class="result-card text-center p-4" style="background: var(--color-success-light); color: var(--color-success); border-radius: 8px;">
                                        <h4 class="mb-2">本息合计</h4>
                                        <h2 id="totalResult">¥0.00</h2>
                                    </div>
                                </div>
                            </div>

                            <div style="background: var(--color-primary-light); border: 1px solid var(--color-primary); border-radius: 8px; padding: var(--spacing-4);">
                                <strong>说明：</strong>
                                <ul id="calculationDetails" style="margin-bottom: 0; margin-top: var(--spacing-3); padding-left: var(--spacing-6); line-height: 1.75;">
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2025 我们的理易港. All rights reserved.</p>
            <p style="margin-top: var(--spacing-2);">让理财变得简单</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function calculateInterest() {
            // 获取输入值
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;
            const years = parseInt(document.getElementById('years').value) || 1;
            const calcType = document.querySelector('input[name="calcType"]:checked').value;

            // 验证输入
            if (principal <= 0) {
                alert('请输入有效的本金');
                return;
            }

            if (rate < 0 || rate > 100) {
                alert('请输入有效的收益率（0-100%）');
                return;
            }

            if (years <= 0 || years > 50) {
                alert('请输入有效的投资期限（1-50年）');
                return;
            }

            // 计算收益
            let interest, total, details;

            if (calcType === 'simple') {
                // 单利计算
                interest = principal * (rate / 100) * years;
                total = principal + interest;
                details = `
                    <li>本金：¥${principal.toLocaleString('zh-CN', {minimumFractionDigits: 2})}</li>
                    <li>年化收益率：${rate}%</li>
                    <li>投资期限：${years}年</li>
                    <li>计算方式：单利</li>
                    <li>利息 = 本金 × 收益率 × 期限</li>
                    <li>利息 = ${principal.toLocaleString('zh-CN', {minimumFractionDigits: 2})} × ${rate}% × ${years} = ¥${interest.toLocaleString('zh-CN', {minimumFractionDigits: 2})}</li>
                `;
            } else {
                // 复利计算
                total = principal * Math.pow(1 + rate / 100, years);
                interest = total - principal;
                details = `
                    <li>本金：¥${principal.toLocaleString('zh-CN', {minimumFractionDigits: 2})}</li>
                    <li>年化收益率：${rate}%</li>
                    <li>投资期限：${years}年</li>
                    <li>计算方式：复利</li>
                    <li>本息合计 = 本金 × (1 + 收益率) ^ 期限</li>
                    <li>本息合计 = ${principal.toLocaleString('zh-CN', {minimumFractionDigits: 2})} × (1 + ${rate}%) ^ ${years} = ¥${total.toLocaleString('zh-CN', {minimumFractionDigits: 2})}</li>
                `;
            }

            // 显示结果
            document.getElementById('interestResult').textContent = '¥' + interest.toLocaleString('zh-CN', {minimumFractionDigits: 2});
            document.getElementById('totalResult').textContent = '¥' + total.toLocaleString('zh-CN', {minimumFractionDigits: 2});
            document.getElementById('calculationDetails').innerHTML = details;

            // 显示结果区域
            document.getElementById('resultSection').style.display = 'block';

            // 滚动到结果区域
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }

        // 页面加载时自动计算一次
        document.addEventListener('DOMContentLoaded', function() {
            calculateInterest();
        });
    </script>
</body>
</html>
