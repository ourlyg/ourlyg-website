<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="理易港 - 用户转化数据分析仪表板">
    <title>数据分析仪表板 - 理易港</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea22 0%, #764ba222 100%);
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        .metric-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(102,126,234,0.08);
            border: 1px solid rgba(102,126,234,0.1);
            margin-bottom: 20px;
        }
        .metric-number {
            font-size: 36px;
            font-weight: 800;
            color: #667eea;
            margin: 0;
        }
        .metric-label {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }
        .metric-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }
        .user-table {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(102,126,234,0.08);
            border: 1px solid rgba(102,126,234,0.1);
        }
        .user-table table {
            margin: 0;
            font-size: 13px;
        }
        .user-table th {
            background: #f8f9ff;
            border-bottom: 2px solid #e8eaf6;
            font-weight: 700;
            color: #333;
            padding: 16px;
        }
        .user-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-submitted { background: #e3f2fd; color: #1976d2; }
        .status-converted { background: #e8f5e9; color: #388e3c; }
        .status-pending { background: #fff3e0; color: #f57c00; }
        h1 {
            font-weight: 800;
            margin-bottom: 32px;
            color: #1a1a1a;
        }
        .refresh-btn {
            background: #667eea;
            border: none;
            color: white;
            border-radius: 50px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .export-btn {
            background: #764ba2;
            border: none;
            color: white;
            border-radius: 50px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-left: 8px;
        }
        .export-btn:hover {
            background: #667eea;
        }
    </style>
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" style="display:none; min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #667eea22 0%, #764ba222 100%);">
        <div style="background:white; padding:40px; border-radius:16px; box-shadow:0 4px 20px rgba(102,126,234,0.15); max-width:400px; width:100%;">
            <h2 style="text-align:center; margin-bottom:30px; font-weight:800; color:#1a1a1a;">管理员后台</h2>
            <input type="password" id="adminPassword" placeholder="请输入管理员密码" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:14px; margin-bottom:16px;" onkeypress="if(event.key==='Enter') adminLogin()">
            <button onclick="adminLogin()" style="width:100%; padding:12px; background:#667eea; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px;">登录</button>
            <p style="text-align:center; color:#888; font-size:12px; margin-top:16px;">⚠️ 此页面包含用户隐私数据，仅限授权访问</p>
        </div>
    </div>

    <!-- 仪表板页面 -->
    <div id="dashboardPage" style="display:none;">
    <div class="dashboard">
        <div class="header">
            <h1>📊 用户转化数据仪表板</h1>
            <div>
                <button class="refresh-btn" onclick="location.reload()">🔄 刷新</button>
                <button class="export-btn" onclick="exportCSV()">📥 导出CSV</button>
                <button class="export-btn" onclick="adminLogout()" style="background:#e74c3c;">🚪 退出登录</button>
            </div>
        </div>

        <!-- KPI指标 -->
        <div class="metric-row">
            <div class="metric-card">
                <p class="metric-number" id="totalUsers">0</p>
                <p class="metric-label">总用户提交</p>
            </div>
            <div class="metric-card">
                <p class="metric-number" id="emailSent">0</p>
                <p class="metric-label">已发送邮件</p>
            </div>
            <div class="metric-card">
                <p class="metric-number" id="converted">0</p>
                <p class="metric-label">已转化</p>
            </div>
            <div class="metric-card">
                <p class="metric-number" id="conversionRate">0%</p>
                <p class="metric-label">转化率</p>
            </div>
        </div>

        <!-- 转化漏斗图 -->
        <div class="metric-card">
            <h5 style="margin-bottom: 20px; font-weight: 700;">转化漏斗</h5>
            <div class="chart-container">
                <canvas id="funnelChart"></canvas>
            </div>
        </div>

        <!-- 服务类型分布 -->
        <div class="metric-card">
            <h5 style="margin-bottom: 20px; font-weight: 700;">服务类型分布</h5>
            <div class="chart-container">
                <canvas id="serviceChart"></canvas>
            </div>
        </div>

        <!-- 用户列表 -->
        <div class="user-table">
            <h5 style="padding: 24px 24px 0; font-weight: 700; margin-bottom: 0;">最近提交用户</h5>
            <table class="table" id="userTable">
                <thead>
                    <tr>
                        <th>用户ID</th>
                        <th>称呼</th>
                        <th>服务类型</th>
                        <th>联系方式</th>
                        <th>提交时间</th>
                        <th>邮件</th>
                        <th>转化</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- JS填充 -->
                </tbody>
            </table>
        </div>

    </div>
    </div>

    <script>
        // ========== 管理员认证 ==========
        const ADMIN_PASSWORD = '12345'; // 🔐 二叔修改这个密码（改成你自己的）

        function adminLogin() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'block';
                loadData();
            } else {
                alert('密码错误');
                document.getElementById('adminPassword').value = '';
            }
        }

        function adminLogout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        // 页面加载时检查登录状态
        window.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
            if (isLoggedIn) {
                document.getElementById('dashboardPage').style.display = 'block';
                document.getElementById('loginPage').style.display = 'none';
                loadData();
            } else {
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('dashboardPage').style.display = 'none';
            }
        });

        // ========== 数据加载 ==========
        // 加载数据
        function loadData() {
            const users = JSON.parse(localStorage.getItem('ourlyg_users') || '[]');
            updateMetrics(users);
            renderTable(users);
            renderCharts(users);
        }

        function updateMetrics(users) {
            const total = users.length;
            const emailSent = users.filter(u => u.email_sent).length;
            const converted = users.filter(u => u.converted).length;
            const rate = total > 0 ? ((converted / total) * 100).toFixed(1) : 0;

            document.getElementById('totalUsers').textContent = total;
            document.getElementById('emailSent').textContent = emailSent;
            document.getElementById('converted').textContent = converted;
            document.getElementById('conversionRate').textContent = rate + '%';
        }

        function renderTable(users) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = users.slice(-20).reverse().map(u => `
                <tr>
                    <td><code style="font-size:11px; color:#888;">${u.id.substring(0, 12)}...</code></td>
                    <td>${u.name || '-'}</td>
                    <td>${u.service_type || '-'}</td>
                    <td><small>${u.contact || '-'}</small></td>
                    <td><small>${new Date(u.timestamp).toLocaleString('zh-CN')}</small></td>
                    <td><span class="status-badge ${u.email_sent ? 'status-converted' : 'status-pending'}">
                        ${u.email_sent ? '✓ 已发' : '⏳ 待发'}
                    </span></td>
                    <td><span class="status-badge ${u.converted ? 'status-converted' : 'status-submitted'}">
                        ${u.converted ? '✓ 已转化' : '⏳ 未转'}
                    </span></td>
                </tr>
            `).join('');
        }

        function renderCharts(users) {
            // 转化漏斗
            const total = users.length;
            const emailSent = users.filter(u => u.email_sent).length;
            const converted = users.filter(u => u.converted).length;

            const funnelCtx = document.getElementById('funnelChart').getContext('2d');
            new Chart(funnelCtx, {
                type: 'bar',
                data: {
                    labels: ['总提交', '已发邮件', '已转化'],
                    datasets: [{
                        label: '用户数',
                        data: [total, emailSent, converted],
                        backgroundColor: ['#667eea', '#764ba2', '#2ecc71'],
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true } }
                }
            });

            // 服务类型分布
            const services = {};
            users.forEach(u => {
                services[u.service_type] = (services[u.service_type] || 0) + 1;
            });

            const serviceCtx = document.getElementById('serviceChart').getContext('2d');
            new Chart(serviceCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(services),
                    datasets: [{
                        data: Object.values(services),
                        backgroundColor: ['#667eea', '#764ba2', '#2ecc71', '#f1c40f', '#e74c3c']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        function exportCSV() {
            const users = JSON.parse(localStorage.getItem('ourlyg_users') || '[]');
            let csv = '用户ID,称呼,服务类型,联系方式,提交时间,邮件状态,转化状态\n';
            csv += users.map(u => 
                `"${u.id}","${u.name}","${u.service_type}","${u.contact}","${u.timestamp}","${u.email_sent ? '已发' : '待发'}","${u.converted ? '已转化' : '未转'}"`
            ).join('\n');

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `ourlyg_users_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // 初始化
        loadData();
        // 每30秒自动刷新
        setInterval(loadData, 30000);
    </script>
</body>
</html>
