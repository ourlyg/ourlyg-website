<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析仪表板 - ourlyg.com</title>
    <link rel="canonical" href="https://ourlyg.com/analytics-dashboard.html">

    
    <meta property="og:url" content="https://ourlyg.com/analytics-dashboard.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://ourlyg.com/images/og-cover.png">
    <meta name="twitter:card" content="summary_large_image">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.0/dist/chart.min.js"></script>
    <style>
        :root {
            --primary: #0066cc;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
        }
        
        body {
            background: #f8f9fa;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .dashboard-title {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }
        
        .time-range-selector {
            display: flex;
            gap: 10px;
        }
        
        .time-range-selector button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .time-range-selector button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .time-range-selector button:hover {
            border-color: var(--primary);
        }
        
        /* KPI卡片 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-left: 5px solid var(--primary);
            transition: all 0.3s ease;
        }
        
        .kpi-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.12);
            transform: translateY(-3px);
        }
        
        .kpi-card.success {
            border-left-color: var(--success);
        }
        
        .kpi-card.warning {
            border-left-color: var(--warning);
        }
        
        .kpi-card.danger {
            border-left-color: var(--danger);
        }
        
        .kpi-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .kpi-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .kpi-change {
            font-size: 0.9rem;
            color: #999;
        }
        
        .kpi-change.positive {
            color: var(--success);
        }
        
        .kpi-change.negative {
            color: var(--danger);
        }
        
        /* 图表容器 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .chart-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        /* 表格 */
        .data-table {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        
        .table {
            margin: 0;
        }
        
        .table th {
            background: #f8f9fa;
            border: none;
            padding: 15px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        
        .table tbody tr:hover {
            background: #f8f9fa;
        }
        
        .badge-success {
            background: var(--success);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .badge-warning {
            background: var(--warning);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        /* 导出按钮 */
        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .export-buttons button {
            padding: 8px 16px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .export-buttons button:hover {
            background: #0052a3;
            transform: translateY(-2px);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .kpi-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            
            .kpi-value {
                font-size: 1.8rem;
            }
            
            .time-range-selector {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- 顶部栏 -->
        <div class="dashboard-header">
            <h1 class="dashboard-title">
                <i class="bi bi-graph-up"></i> 数据分析仪表板
            </h1>
            <div class="time-range-selector">
                <button class="active" onclick="selectTimeRange('day')">今日</button>
                <button onclick="selectTimeRange('week')">本周</button>
                <button onclick="selectTimeRange('month')">本月</button>
            </div>
        </div>
        
        <!-- 导出按钮 -->
        <div class="export-buttons">
            <button onclick="exportToJSON()">
                <i class="bi bi-download"></i> 导出 JSON
            </button>
            <button onclick="exportToCSV()">
                <i class="bi bi-download"></i> 导出 CSV
            </button>
            <button onclick="printReport()">
                <i class="bi bi-printer"></i> 打印
            </button>
        </div>
        
        <!-- KPI卡片 -->
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">
                    <i class="bi bi-people"></i> 活跃用户
                </div>
                <div class="kpi-value" id="activeUsers">0</div>
                <div class="kpi-change positive">
                    <i class="bi bi-arrow-up"></i> <span id="usersChange">+0%</span> vs 昨天
                </div>
            </div>
            
            <div class="kpi-card warning">
                <div class="kpi-label">
                    <i class="bi bi-clock-history"></i> 会话数
                </div>
                <div class="kpi-value" id="sessions">0</div>
                <div class="kpi-change" id="sessionChange">
                    平均时长: 0秒
                </div>
            </div>
            
            <div class="kpi-card success">
                <div class="kpi-label">
                    <i class="bi bi-cart-check"></i> 转换数
                </div>
                <div class="kpi-value" id="conversions">0</div>
                <div class="kpi-change">
                    转换率: <span id="conversionRate">0%</span>
                </div>
            </div>
            
            <div class="kpi-card danger">
                <div class="kpi-label">
                    <i class="bi bi-currency-exchange"></i> 总收入
                </div>
                <div class="kpi-value" id="revenue">0</div>
                <div class="kpi-change">
                    平均订单值: <span id="avgOrderValue">0</span>
                </div>
            </div>
        </div>
        
        <!-- 图表 -->
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">
                    <i class="bi bi-graph-up-arrow"></i> 用户趋势
                </div>
                <canvas id="usersChart"></canvas>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">
                    <i class="bi bi-pie-chart"></i> 转换类型分布
                </div>
                <canvas id="conversionChart"></canvas>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">
                    <i class="bi bi-bar-chart"></i> 收入走势
                </div>
                <canvas id="revenueChart"></canvas>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">
                    <i class="bi bi-hourglass-split"></i> 平均会话时长
                </div>
                <canvas id="sessionDurationChart"></canvas>
            </div>
        </div>
        
        <!-- 数据表格 -->
        <div class="data-table">
            <div class="chart-title">
                <i class="bi bi-list-ul"></i> 热门页面
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>页面</th>
                        <th>浏览次数</th>
                        <th>平均停留时间</th>
                        <th>转换率</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="topPagesTable">
                    <tr>
                        <td colspan="5" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 转换明细表 -->
        <div class="data-table">
            <div class="chart-title">
                <i class="bi bi-receipt"></i> 转换明细
            </div>
            <table class="table">
                <thead>
                    <tr>
                        <th>转换类型</th>
                        <th>数量</th>
                        <th>总金额</th>
                        <th>平均金额</th>
                        <th>占比</th>
                    </tr>
                </thead>
                <tbody id="conversionDetailsTable">
                    <tr>
                        <td colspan="5" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let currentTimeRange = 'day';
        let chartInstances = {};
        let dashboardData = {};
        
        // 初始化仪表板
        function initDashboard() {
            loadDashboardData();
            initCharts();
            
            // 每30秒刷新一次数据
            setInterval(loadDashboardData, 30000);
        }
        
        // 加载数据
        function loadDashboardData() {
            // 这里应该通过API调用获取实时数据
            // 现在使用模拟数据演示
            dashboardData = generateMockData();
            updateDashboard();
        }
        
        // 更新仪表板
        function updateDashboard() {
            // 更新KPI卡片
            document.getElementById('activeUsers').textContent = 
                dashboardData.real_time.unique_users_today;
            document.getElementById('sessions').textContent = 
                dashboardData.real_time.active_sessions;
            document.getElementById('conversions').textContent = 
                dashboardData.real_time.total_conversions;
            document.getElementById('revenue').textContent = 
                'CNY ' + dashboardData.real_time.total_revenue.toFixed(2);
            
            document.getElementById('conversionRate').textContent = 
                dashboardData.kpis.conversion_rate.toFixed(2) + '%';
            document.getElementById('avgOrderValue').textContent = 
                'CNY ' + dashboardData.kpis.avg_order_value.toFixed(2);
            document.getElementById('sessionChange').textContent = 
                '平均时长: ' + dashboardData.kpis.avg_session_duration + '秒';
            
            // 更新表格
            updateTopPagesTable();
            updateConversionDetailsTable();
            
            // 更新图表
            updateCharts();
        }
        
        // 更新热门页面表格
        function updateTopPagesTable() {
            const tbody = document.getElementById('topPagesTable');
            tbody.innerHTML = '';
            
            dashboardData.top_pages.forEach((page, index) => {
                const row = document.createElement('tr');
                const views = page.views || 0;
                const timeOnPage = page.avg_time || 0;
                const convRate = Math.random() * 10; // 模拟转换率
                
                row.innerHTML = `
                    <td>${page.page_title || page.page_url}</td>
                    <td>${views}</td>
                    <td>${timeOnPage}秒</td>
                    <td>${convRate.toFixed(2)}%</td>
                    <td>
                        <span class="badge-success">
                            <i class="bi bi-check-circle"></i> 正常
                        </span>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 更新转换明细表
        function updateConversionDetailsTable() {
            const tbody = document.getElementById('conversionDetailsTable');
            tbody.innerHTML = '';
            
            let totalCount = 0;
            let totalValue = 0;
            
            // 计算总数
            for (let type in dashboardData.conversion_breakdown) {
                const conv = dashboardData.conversion_breakdown[type];
                totalCount += conv.count;
                totalValue += conv.total_value || 0;
            }
            
            for (let type in dashboardData.conversion_breakdown) {
                const conv = dashboardData.conversion_breakdown[type];
                const count = conv.count;
                const value = conv.total_value || 0;
                const percent = totalCount > 0 ? ((count / totalCount) * 100).toFixed(2) : 0;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${type}</td>
                    <td>${count}</td>
                    <td>CNY ${value.toFixed(2)}</td>
                    <td>CNY ${(value / count).toFixed(2)}</td>
                    <td>${percent}%</td>
                `;
                tbody.appendChild(row);
            }
        }
        
        // 初始化图表
        function initCharts() {
            const ctx1 = document.getElementById('usersChart').getContext('2d');
            const ctx2 = document.getElementById('conversionChart').getContext('2d');
            const ctx3 = document.getElementById('revenueChart').getContext('2d');
            const ctx4 = document.getElementById('sessionDurationChart').getContext('2d');
            
            // 用户趋势图
            chartInstances.users = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                    datasets: [{
                        label: '日活跃用户',
                        data: [50, 80, 120, 95, 150, 200, 180],
                        borderColor: '#0066cc',
                        backgroundColor: 'rgba(0, 102, 204, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#0066cc',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { display: true, drawBorder: false }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
            
            // 转换类型分布
            chartInstances.conversion = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: ['VIP订阅', '升级', '续费'],
                    datasets: [{
                        data: [60, 25, 15],
                        backgroundColor: ['#0066cc', '#28a745', '#ffc107'],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
            
            // 收入走势
            chartInstances.revenue = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                    datasets: [{
                        label: '日收入 (CNY)',
                        data: [120, 190, 150, 220, 280, 350, 300],
                        backgroundColor: '#28a745',
                        borderColor: '#1e7e34',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { display: true, drawBorder: false }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
            
            // 平均会话时长
            chartInstances.duration = new Chart(ctx4, {
                type: 'line',
                data: {
                    labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                    datasets: [{
                        label: '平均会话时长 (秒)',
                        data: [180, 220, 190, 250, 300, 280, 260],
                        borderColor: '#17a2b8',
                        backgroundColor: 'rgba(23, 162, 184, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { display: true, drawBorder: false }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }
        
        // 更新图表数据
        function updateCharts() {
            // 在实际应用中，这里会更新图表数据
        }
        
        // 时间范围选择
        function selectTimeRange(range) {
            currentTimeRange = range;
            
            // 更新按钮状态
            document.querySelectorAll('.time-range-selector button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadDashboardData();
        }
        
        // 导出JSON
        function exportToJSON() {
            const dataStr = JSON.stringify(dashboardData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `analytics_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }
        
        // 导出CSV
        function exportToCSV() {
            let csv = 'Page,Views,Avg Time,Conversion Rate\n';
            dashboardData.top_pages.forEach(page => {
                csv += `"${page.page_title}",${page.views},${page.avg_time},0%\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `analytics_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
        
        // 打印
        function printReport() {
            window.print();
        }
        
        // 生成模拟数据
        function generateMockData() {
            return {
                timestamp: new Date().toISOString(),
                real_time: {
                    active_sessions: Math.floor(Math.random() * 100) + 20,
                    unique_users_today: Math.floor(Math.random() * 200) + 50,
                    total_conversions: Math.floor(Math.random() * 20) + 5,
                    total_revenue: Math.random() * 500 + 100
                },
                trends: {
                    daily_active_users: Math.floor(Math.random() * 200) + 50,
                    weekly_active_users: Math.floor(Math.random() * 1000) + 300,
                    monthly_active_users: Math.floor(Math.random() * 3000) + 1000,
                    daily_revenue: Math.random() * 500 + 100
                },
                top_pages: [
                    { page_url: '/news.html', page_title: '财经新闻', views: 150, avg_time: 45 },
                    { page_url: '/vip-subscription.html', page_title: 'VIP订阅', views: 80, avg_time: 120 },
                    { page_url: '/index.html', page_title: '首页', views: 200, avg_time: 30 },
                    { page_url: '/tools', page_title: '理财工具', views: 95, avg_time: 75 },
                    { page_url: '/reviews', page_title: '产品测评', views: 60, avg_time: 90 }
                ],
                conversion_breakdown: {
                    'vip_subscribe': { count: 12, total_value: 239.8 },
                    'upgrade': { count: 3, total_value: 59.7 },
                    'renewal': { count: 2, total_value: 39.8 }
                },
                kpis: {
                    conversion_rate: 8.5,
                    avg_session_duration: 180,
                    avg_order_value: 19.98
                }
            };
        }
        
        // 页面加载完成时初始化
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
    <!-- 移动端底部Tab导航 -->
    <nav class="mobile-bottom-nav">
        <a href="index.html">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">首页</span>
        </a>
        <a href="services/index.html">
            <span class="tab-icon">🤖</span>
            <span class="tab-label">AI服务</span>
        </a>
        <a href="products/index.html">
            <span class="tab-icon">📋</span>
            <span class="tab-label">测评</span>
        </a>
        <a href="tools/index.html">
            <span class="tab-icon">🧮</span>
            <span class="tab-label">工具</span>
        </a>
        <a href="knowledge/index.html">
            <span class="tab-icon">📚</span>
            <span class="tab-label">知识</span>
        </a>
    </nav>
</body>
</html>
