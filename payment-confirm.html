<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="支付确认 - 理易港AI金融分析">
    <title>支付确认 - 理易港</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea22 0%, #764ba222 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .payment-card {
            background: white;
            border-radius: 24px;
            padding: 44px;
            box-shadow: 0 8px 40px rgba(102,126,234,0.15);
            border: 1px solid #ede9fe;
            max-width: 500px;
            width: 100%;
        }
        .payment-card h2 {
            font-weight: 800;
            margin-bottom: 24px;
            color: #1a1a1a;
        }
        .price-display {
            background: linear-gradient(135deg, #667eea22 0%, #764ba222 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        .price-display .label {
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .price-display .amount {
            font-size: 42px;
            font-weight: 800;
            color: #667eea;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-row .label {
            color: #888;
            font-size: 14px;
        }
        .info-row .value {
            font-weight: 600;
            color: #333;
            text-align: right;
            word-break: break-all;
        }
        .payment-methods {
            margin-top: 24px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
        }
        .payment-methods h5 {
            font-weight: 700;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .method-item {
            padding: 12px 0;
            font-size: 14px;
            color: #333;
        }
        .method-item strong {
            display: block;
            margin-bottom: 4px;
            color: #667eea;
        }
        .confirm-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
            box-shadow: 0 4px 20px rgba(102,126,234,0.3);
        }
        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(102,126,234,0.4);
        }
        .note {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <h2>📋 订单确认</h2>
        
        <div class="price-display">
            <div class="label">应付金额</div>
            <div class="amount" id="amountDisplay">¥0</div>
        </div>

        <div id="infoContainer">
            <!-- JS填充 -->
        </div>

        <div class="payment-methods">
            <h5>💳 支付方式</h5>
            <div class="method-item">
                <strong>方式 1：微信支付</strong>
                联系方式：微信号 <code>lbj_wx</code><br>
                转账金额 + 简单说明需求
            </div>
            <div class="method-item">
                <strong>方式 2：支付宝</strong>
                账户：contact@ourlyg.com<br>
                转账后请回复邮件确认
            </div>
            <div class="method-item">
                <strong>方式 3：银行转账</strong>
                详见邮件确认
            </div>
        </div>

        <button class="confirm-btn" onclick="completePayment()">✓ 已完成支付</button>

        <div class="note">
            ⏳ 支付完成后，我会立即开始分析<br>
            问题？直接回复这封邮件
        </div>
    </div>

    <script>
        // 解析URL参数
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email') || '未知';
        const service = params.get('service') || '未知';
        const amount = params.get('amount') || '0';
        const userId = params.get('user_id') || '未知';

        // 显示订单信息
        function displayOrder() {
            document.getElementById('amountDisplay').textContent = '¥' + (amount / 100 || '0');

            const infoHtml = `
                <div class="info-row">
                    <div class="label">服务类型</div>
                    <div class="value">${service}</div>
                </div>
                <div class="info-row">
                    <div class="label">用户邮箱</div>
                    <div class="value">${email}</div>
                </div>
                <div class="info-row">
                    <div class="label">订单号</div>
                    <div class="value"><code style="font-size:11px;">${userId}</code></div>
                </div>
                <div class="info-row">
                    <div class="label">创建时间</div>
                    <div class="value">${new Date().toLocaleString('zh-CN')}</div>
                </div>
            `;
            document.getElementById('infoContainer').innerHTML = infoHtml;
        }

        // 标记订单为已完成
        function completePayment() {
            // 更新本地CRM用户状态
            const users = JSON.parse(localStorage.getItem('ourlyg_users') || '[]');
            const user = users.find(u => u.id === userId);
            if (user) {
                user.converted = true;
                localStorage.setItem('ourlyg_users', JSON.stringify(users));
            }

            alert('支付已记录！\n\n我会立即检查您的转账，并开始分析。\n感谢您的信任！');
            window.location.href = '/';
        }

        displayOrder();
    </script>
    <!-- 移动端底部Tab导航 -->
    <nav class="mobile-bottom-nav">
        <a href="index.html">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">首页</span>
        </a>
        <a href="services/index.html">
            <span class="tab-icon">🤖</span>
            <span class="tab-label">AI服务</span>
        </a>
        <a href="products/index.html">
            <span class="tab-icon">📋</span>
            <span class="tab-label">测评</span>
        </a>
        <a href="tools/index.html">
            <span class="tab-icon">🧮</span>
            <span class="tab-label">工具</span>
        </a>
        <a href="knowledge/index.html">
            <span class="tab-icon">📚</span>
            <span class="tab-label">知识</span>
        </a>
    </nav>
</body>
</html>
